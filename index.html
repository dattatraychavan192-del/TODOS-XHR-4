<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous" />
  <link rel="stylesheet" href="./assets/CSS/style.css" />

  <title>User Dashboard</title>
</head>

<body class="font-awesome">
  <h1 class="bg-secondary text-white text-center border-info p-2">USER LOGIN PAGE</h1>
  <div class="container">
    <div class="row w-100 justify-content-center">
      <div class="col-md-4 ">
        <div class="card shadow border-info rounded ">
          <div class="card-header border-info">
            <h1 class="text-center"> <i class="fa-solid fa-user-plus border-info"></i> User Loin</h1>
          </div>
          <div class="card-body">
            <form id="loginForm"> 
              <div class="form-group">
                <input type="text" placeholder="Name" class="form-control border-info"  id="name"/>
              </div>
              <div class="form-group">
                <input type="text" placeholder="Username" class="form-control border-info" id="username" />
              </div>
              <div class="form-group">
                <input type="text" placeholder="Email" class="form-control border-info" id="email"/>
              </div>
              <div class="form-group">
                <input type="text" placeholder="Address" class="form-control border-info"  id="address"/>
              </div>
              <div class="form-group">
                <input type="text" placeholder="Phone" class="form-control border-info" id="phone" />
              </div>

              <button class="btn btn-primary btn-block" id="editBtn">Add User</button>
              <button type="button" class="btn btn-primary d-none btn-block" id="updateBtn">Update User</buttton>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card shadow border-info">
          <div class="card-header text-center border-info"> <h2><i  class="fa-solid fa-users-rectangle"></i>User Information Table</h2></div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-bordered table-hover table-striped text-center ">
                <thead class="bg-secondary">
                    <tr>
                      <th>No</th>
                      <th>Name</th>
                      <th>User Name</th>
                      <th>Email</th>
                      <th>Address</th>
                      <th>Phone</th>

                      <th>Edit</th>
                      <th>Delete</th>
                    </tr>
                </thead>
                <tbody id="cardContainer">
                  <!-- <tr>
                    <td></td>
                    <td></td>
                    <td></td> 
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <button class="btn btn-success " onclick="onEdit"></button>
                    <button class="btn btn-info " onclick="onDelete"></button>

                  </tr> -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./assets/JS/app.js"></script>
</body>

</html>
